<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      AI Agent Cost Monitor - Real-time Cost Tracking & Budget Enforcement
    </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0e27;
        --bg-secondary: #141937;
        --bg-card: #1a1f3a;
        --accent-primary: #00d4ff;
        --accent-secondary: #7c3aed;
        --accent-danger: #ef4444;
        --accent-success: #10b981;
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --text-muted: #64748b;
        --border: rgba(255, 255, 255, 0.1);
      }

      body {
        font-family:
          "Manrope",
          -apple-system,
          sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* Animated background gradient */
      body::before {
        content: "";
        position: fixed;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background:
          radial-gradient(
            circle at 20% 50%,
            rgba(0, 212, 255, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(124, 58, 237, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 40% 20%,
            rgba(16, 185, 129, 0.1) 0%,
            transparent 50%
          );
        animation: gradientShift 20s ease infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes gradientShift {
        0%,
        100% {
          transform: translate(0, 0) rotate(0deg);
        }
        33% {
          transform: translate(5%, 10%) rotate(120deg);
        }
        66% {
          transform: translate(-5%, 5%) rotate(240deg);
        }
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        z-index: 1;
      }

      /* Header */
      .header {
        text-align: center;
        padding: 60px 20px 40px;
        position: relative;
      }

      .header h1 {
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 800;
        background: linear-gradient(
          135deg,
          var(--accent-primary) 0%,
          var(--accent-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        letter-spacing: -0.02em;
        animation: fadeInUp 0.6s ease;
      }

      .header-subtitle {
        font-size: 1.125rem;
        color: var(--text-secondary);
        margin-bottom: 20px;
        font-weight: 500;
        animation: fadeInUp 0.6s ease 0.1s both;
      }

      .header-links {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        animation: fadeInUp 0.6s ease 0.2s both;
      }

      .header-links a {
        color: var(--accent-primary);
        text-decoration: none;
        font-size: 0.95rem;
        font-weight: 600;
        transition: all 0.3s ease;
        position: relative;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid transparent;
      }

      .header-links a:hover {
        border-color: var(--accent-primary);
        background: rgba(0, 212, 255, 0.05);
        transform: translateY(-2px);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Input Section */
      .input-section {
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 32px;
        border-radius: 16px;
        margin-bottom: 32px;
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        animation: fadeInUp 0.6s ease 0.3s both;
      }

      .section-title {
        font-size: 1.125rem;
        font-weight: 700;
        margin-bottom: 20px;
        color: var(--text-primary);
        letter-spacing: -0.01em;
      }

      .input-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin-bottom: 16px;
      }

      .input-group {
        display: flex;
        gap: 12px;
      }

      input[type="text"],
      input[type="number"],
      input[type="email"] {
        flex: 1;
        padding: 14px 18px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-primary);
        font-size: 0.95rem;
        font-family: "JetBrains Mono", monospace;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: var(--accent-primary);
        background: rgba(0, 212, 255, 0.05);
        box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
      }

      input::placeholder {
        color: var(--text-muted);
      }

      button {
        padding: 14px 32px;
        background: linear-gradient(
          135deg,
          var(--accent-primary) 0%,
          var(--accent-secondary) 100%
        );
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        white-space: nowrap;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        position: relative;
        overflow: hidden;
      }

      button::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition:
          width 0.6s,
          height 0.6s;
      }

      button:hover::before {
        width: 300px;
        height: 300px;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 24px rgba(0, 212, 255, 0.3);
      }

      button:active {
        transform: translateY(0);
      }

      .status-message {
        padding: 12px 18px;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        margin-top: 12px;
        animation: slideIn 0.3s ease;
      }

      .status-success {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid var(--accent-success);
        color: var(--accent-success);
      }

      .status-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--accent-danger);
        color: var(--accent-danger);
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Stats Grid */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 32px;
        animation: fadeInUp 0.6s ease 0.4s both;
      }

      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 28px;
        border-radius: 16px;
        backdrop-filter: blur(20px);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--accent-primary),
          var(--accent-secondary)
        );
        transform: scaleX(0);
        transform-origin: left;
        transition: transform 0.6s ease;
      }

      .stat-card:hover::before {
        transform: scaleX(1);
      }

      .stat-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
        border-color: rgba(0, 212, 255, 0.3);
      }

      .stat-label {
        color: var(--text-secondary);
        font-size: 0.875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
      }

      .stat-value {
        font-size: 2.5rem;
        font-weight: 800;
        color: var(--text-primary);
        font-family: "JetBrains Mono", monospace;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      .stat-value.cost {
        background: linear-gradient(
          135deg,
          var(--accent-primary) 0%,
          var(--accent-secondary) 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Chart Container */
      .chart-container {
        background: var(--bg-card);
        border: 1px solid var(--border);
        padding: 32px;
        border-radius: 16px;
        margin-bottom: 32px;
        backdrop-filter: blur(20px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        animation: fadeInUp 0.6s ease 0.5s both;
      }

      .chart-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 24px;
        color: var(--text-primary);
        letter-spacing: -0.01em;
      }

      canvas {
        max-height: 400px;
      }

      /* Loading State */
      .loading {
        text-align: center;
        padding: 80px 20px;
        animation: pulse 1.5s ease infinite;
      }

      .loading-spinner {
        width: 50px;
        height: 50px;
        margin: 0 auto 20px;
        border: 3px solid var(--border);
        border-top-color: var(--accent-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 100px 20px;
        animation: fadeInUp 0.6s ease;
      }

      .empty-state-icon {
        font-size: 4rem;
        margin-bottom: 20px;
        opacity: 0.3;
      }

      .empty-state h3 {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text-primary);
      }

      .empty-state p {
        color: var(--text-secondary);
        font-size: 1rem;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header h1 {
          font-size: 2rem;
        }

        .input-row {
          grid-template-columns: 1fr;
        }

        .input-group {
          flex-direction: column;
        }

        .stats-grid {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>💰 AI Agent Cost Monitor</h1>
        <p class="header-subtitle">
          Real-time cost tracking & budget enforcement for AI agents
        </p>
        <div class="header-links">
          <a href="/privacy.html">🔒 Privacy Policy</a>
          <a href="https://github.com/Mkiza/ai-agent-cost" target="_blank"
            >⭐ Open Source</a
          >
        </div>
      </div>

      <div class="input-section">
        <h3 class="section-title">📊 View Your Costs</h3>
        <div class="input-row">
          <input
            type="text"
            id="apiKeyInput"
            placeholder="Enter your API key (e.g., demo-customer)"
            value="demo-customer"
          />
          <button onclick="loadCosts()">View Costs</button>
        </div>
      </div>

      <div class="input-section">
        <h3 class="section-title">💰 Set Budget Limits</h3>
        <div class="input-group" style="margin-bottom: 12px">
          <input
            type="number"
            id="dailyLimit"
            placeholder="Daily limit (USD, e.g., 100)"
            step="0.01"
          />
          <input
            type="number"
            id="monthlyLimit"
            placeholder="Monthly limit (USD, e.g., 1000)"
            step="0.01"
          />
        </div>
        <div class="input-row">
          <input
            type="email"
            id="alertEmail"
            placeholder="Alert email (optional)"
          />
          <button onclick="setBudget()">Set Budget</button>
        </div>
        <div id="budgetStatus"></div>
      </div>

      <div id="errorMessage"></div>
      <div id="loadingMessage"></div>
      <div id="dashboard"></div>
    </div>

    <script>
      let costChart = null;
      let tokenChart = null;

      async function loadCosts() {
        const apiKey = document.getElementById("apiKeyInput").value.trim();

        if (!apiKey) {
          showError("Please enter an API key");
          return;
        }

        showLoading();
        clearError();

        try {
          const response = await fetch(`/api/costs/${apiKey}`);
          const data = await response.json();

          if (data.error) {
            showError(data.error);
            return;
          }

          if (!data.daily_breakdown || data.daily_breakdown.length === 0) {
            showEmptyState();
            return;
          }

          renderDashboard(data);
        } catch (error) {
          showError("Failed to load costs: " + error.message);
        } finally {
          hideLoading();
        }
      }

      function renderDashboard(data) {
        const dashboard = document.getElementById("dashboard");
        const summary = data.summary;
        const daily = data.daily_breakdown;

        dashboard.innerHTML = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total Requests</div>
                        <div class="stat-value">${summary.total_requests.toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total Cost</div>
                        <div class="stat-value cost">$${parseFloat(summary.total_cost_usd).toFixed(4)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Avg Cost / Request</div>
                        <div class="stat-value cost">$${(parseFloat(summary.total_cost_usd) / summary.total_requests).toFixed(6)}</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Last Request</div>
                        <div class="stat-value" style="font-size: 1.5rem;">${new Date(daily[0].date).toLocaleDateString()}</div>
                    </div>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">📈 Daily Cost Breakdown</h3>
                    <canvas id="costChart"></canvas>
                </div>
                
                <div class="chart-container">
                    <h3 class="chart-title">🎯 Token Usage</h3>
                    <canvas id="tokenChart"></canvas>
                </div>
            `;

        renderCharts(daily);
      }

      function renderCharts(daily) {
        // Cost chart
        const costCtx = document.getElementById("costChart").getContext("2d");

        if (costChart) costChart.destroy();

        costChart = new Chart(costCtx, {
          type: "bar",
          data: {
            labels: daily
              .map((d) => new Date(d.date).toLocaleDateString())
              .reverse(),
            datasets: [
              {
                label: "Daily Cost (USD)",
                data: daily.map((d) => d.daily_cost_usd).reverse(),
                backgroundColor: "rgba(0, 212, 255, 0.2)",
                borderColor: "rgba(0, 212, 255, 1)",
                borderWidth: 2,
                borderRadius: 8,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false },
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: "rgba(255, 255, 255, 0.05)" },
                ticks: {
                  color: "#94a3b8",
                  callback: (value) => "$" + value.toFixed(4),
                },
              },
              x: {
                grid: { display: false },
                ticks: { color: "#94a3b8" },
              },
            },
          },
        });

        // Token chart
        const tokenCtx = document.getElementById("tokenChart").getContext("2d");

        if (tokenChart) tokenChart.destroy();

        tokenChart = new Chart(tokenCtx, {
          type: "line",
          data: {
            labels: daily
              .map((d) => new Date(d.date).toLocaleDateString())
              .reverse(),
            datasets: [
              {
                label: "Input Tokens",
                data: daily.map((d) => d.total_input_tokens).reverse(),
                borderColor: "rgba(16, 185, 129, 1)",
                backgroundColor: "rgba(16, 185, 129, 0.1)",
                borderWidth: 3,
                tension: 0.4,
                fill: true,
              },
              {
                label: "Output Tokens",
                data: daily.map((d) => d.total_output_tokens).reverse(),
                borderColor: "rgba(124, 58, 237, 1)",
                backgroundColor: "rgba(124, 58, 237, 0.1)",
                borderWidth: 3,
                tension: 0.4,
                fill: true,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: {
                display: true,
                labels: { color: "#94a3b8", font: { size: 12 } },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                grid: { color: "rgba(255, 255, 255, 0.05)" },
                ticks: { color: "#94a3b8" },
              },
              x: {
                grid: { display: false },
                ticks: { color: "#94a3b8" },
              },
            },
          },
        });
      }

      async function setBudget() {
        const apiKey = document.getElementById("apiKeyInput").value.trim();
        const dailyLimit =
          parseFloat(document.getElementById("dailyLimit").value) || null;
        const monthlyLimit =
          parseFloat(document.getElementById("monthlyLimit").value) || null;
        const alertEmail =
          document.getElementById("alertEmail").value.trim() || null;

        if (!apiKey) {
          showError("Please enter an API key first");
          return;
        }

        try {
          const response = await fetch(`/api/budget/${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              daily_limit: dailyLimit,
              monthly_limit: monthlyLimit,
              alert_email: alertEmail,
            }),
          });

          const data = await response.json();

          if (data.success) {
            const statusEl = document.getElementById("budgetStatus");
            statusEl.innerHTML =
              '<div class="status-message status-success">✅ Budget set! You\'ll receive alerts when limits are exceeded.</div>';
            setTimeout(() => (statusEl.innerHTML = ""), 5000);
          }
        } catch (error) {
          showError("Failed to set budget: " + error.message);
        }
      }

      function showEmptyState() {
        document.getElementById("dashboard").innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <h3>No data yet</h3>
                    <p>Send some requests through the proxy to see costs here</p>
                </div>
            `;
      }

      function showError(message) {
        document.getElementById("errorMessage").innerHTML =
          `<div class="status-message status-error">❌ ${message}</div>`;
      }

      function clearError() {
        document.getElementById("errorMessage").innerHTML = "";
      }

      function showLoading() {
        document.getElementById("loadingMessage").innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p style="color: var(--text-secondary);">Loading costs...</p>
                </div>
            `;
      }

      function hideLoading() {
        document.getElementById("loadingMessage").innerHTML = "";
      }

      window.onload = () => {
        const apiKey = document.getElementById("apiKeyInput").value;
        if (apiKey) loadCosts();
      };
    </script>
  </body>
</html>
